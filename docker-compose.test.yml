services:
  neo4j_test:
    image: neo4j:latest
    ports:
      - '7475:7474' # HTTP
      - '7688:7687' # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-test-data:/data
      - neo4j-test-logs:/logs
    healthcheck:
      test: ['CMD', 'cypher-shell', '-u', 'neo4j', '-p', 'password', 'RETURN 1']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j-test-data:
  neo4j-test-logs:
